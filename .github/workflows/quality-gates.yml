name: quality-gates

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

concurrency:
  group: quality-gates-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prospective-metadata:
    name: prospective metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the complete prospective history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install fixed-hash upstream Nix without correlated action metadata
        env:
          NIX_INSTALLER_PATH: ${{ runner.temp }}/nix-installer-x86_64-linux
          NIX_INSTALLER_SHA256: dce3363351d5886e996a7ce42619f4fd498939f5f881e40e0e39731175dd424e
        run: |
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            --output "$NIX_INSTALLER_PATH" \
            'https://github.com/DeterminateSystems/nix-installer/releases/download/v3.21.7/nix-installer-x86_64-linux'
          printf '%s  %s\n' "$NIX_INSTALLER_SHA256" "$NIX_INSTALLER_PATH" \
            | sha256sum --check --strict -
          chmod 0755 "$NIX_INSTALLER_PATH"
          sudo env DETSYS_IDS_TELEMETRY=disabled \
            "$NIX_INSTALLER_PATH" install linux \
            --no-confirm \
            --prefer-upstream-nix \
            --diagnostic-endpoint "" \
            --no-modify-profile
          printf '%s\n' /nix/var/nix/profiles/default/bin >> "$GITHUB_PATH"

      - name: Check pull-request title and body
        run: >-
          nix develop --no-update-lock-file --no-write-lock-file --command
          python3 scripts/check_change_metadata.py pr-event
          --event "$GITHUB_EVENT_PATH"

      - name: Check every commit in the exact prospective range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: >-
          nix develop --no-update-lock-file --no-write-lock-file --command
          python3 scripts/check_change_metadata.py commit-range
          --base "$BASE_SHA" --head "$HEAD_SHA"

  repository-contract:
    name: repository contract
    needs: prospective-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the prospective repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install fixed-hash upstream Nix without correlated action metadata
        env:
          NIX_INSTALLER_PATH: ${{ runner.temp }}/nix-installer-x86_64-linux
          NIX_INSTALLER_SHA256: dce3363351d5886e996a7ce42619f4fd498939f5f881e40e0e39731175dd424e
        run: |
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            --output "$NIX_INSTALLER_PATH" \
            'https://github.com/DeterminateSystems/nix-installer/releases/download/v3.21.7/nix-installer-x86_64-linux'
          printf '%s  %s\n' "$NIX_INSTALLER_SHA256" "$NIX_INSTALLER_PATH" \
            | sha256sum --check --strict -
          chmod 0755 "$NIX_INSTALLER_PATH"
          sudo env DETSYS_IDS_TELEMETRY=disabled \
            "$NIX_INSTALLER_PATH" install linux \
            --no-confirm \
            --prefer-upstream-nix \
            --diagnostic-endpoint "" \
            --no-modify-profile
          printf '%s\n' /nix/var/nix/profiles/default/bin >> "$GITHUB_PATH"

      - name: Verify the locked toolchain
        run: >-
          nix flake check --no-update-lock-file --no-write-lock-file
          --print-build-logs

      - name: Run the complete repository gate
        run: >-
          nix develop --no-update-lock-file --no-write-lock-file --command
          python3 scripts/check_repo.py
